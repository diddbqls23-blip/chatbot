<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude 챗봇</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 100%;
      max-width: 720px;
      height: 90vh;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 20px 24px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-header .avatar {
      width: 36px;
      height: 36px;
      background: #1a1a1a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .chat-header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .chat-header .status {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .messages::-webkit-scrollbar {
      width: 4px;
    }

    .messages::-webkit-scrollbar-thumb {
      background: #e0e0e0;
      border-radius: 2px;
    }

    .message {
      display: flex;
      gap: 10px;
      max-width: 80%;
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
    }

    .message.assistant .bubble {
      background: #f4f4f4;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
    }

    .message.user .bubble {
      background: #1a1a1a;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message .msg-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .message.assistant .msg-icon {
      background: #1a1a1a;
    }

    .message.user .msg-icon {
      background: #e0e0e0;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 14px 16px;
      background: #f4f4f4;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing-indicator span {
      width: 6px;
      height: 6px;
      background: #aaa;
      border-radius: 50%;
      animation: typing 1.2s ease-in-out infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    .input-area {
      padding: 16px 24px;
      border-top: 1px solid #f0f0f0;
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .input-area textarea {
      flex: 1;
      border: 1.5px solid #e8e8e8;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 120px;
      min-height: 46px;
      line-height: 1.5;
      color: #1a1a1a;
      transition: border-color 0.2s;
    }

    .input-area textarea:focus {
      border-color: #1a1a1a;
    }

    .input-area textarea::placeholder {
      color: #bbb;
    }

    .send-btn {
      width: 46px;
      height: 46px;
      background: #1a1a1a;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
    }

    .send-btn:hover {
      background: #333;
    }

    .send-btn:active {
      transform: scale(0.95);
    }

    .send-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .send-btn svg {
      width: 18px;
      height: 18px;
      fill: #fff;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #bbb;
    }

    .empty-state .icon {
      font-size: 40px;
    }

    .empty-state p {
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="avatar">✦</div>
      <div>
        <h1>Claude</h1>
        <div class="status">AI 어시스턴트</div>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <div class="icon">✦</div>
        <p>무엇이든 물어보세요</p>
      </div>
    </div>

    <div class="input-area">
      <textarea
        id="userInput"
        placeholder="메시지를 입력하세요..."
        rows="1"
      ></textarea>
      <button class="send-btn" id="sendBtn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const emptyState = document.getElementById('emptyState');

    const history = [];

    function appendMessage(role, text) {
      if (emptyState) emptyState.remove();

      const wrapper = document.createElement('div');
      wrapper.className = `message ${role}`;

      const icon = document.createElement('div');
      icon.className = 'msg-icon';
      icon.textContent = role === 'assistant' ? '✦' : '나';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;

      wrapper.appendChild(icon);
      wrapper.appendChild(bubble);
      messagesEl.appendChild(wrapper);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return wrapper;
    }

    function showTyping() {
      if (emptyState) emptyState.remove();
      const wrapper = document.createElement('div');
      wrapper.className = 'message assistant';
      wrapper.id = 'typingIndicator';

      const icon = document.createElement('div');
      icon.className = 'msg-icon';
      icon.textContent = '✦';

      const indicator = document.createElement('div');
      indicator.className = 'typing-indicator';
      indicator.innerHTML = '<span></span><span></span><span></span>';

      wrapper.appendChild(icon);
      wrapper.appendChild(indicator);
      messagesEl.appendChild(wrapper);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById('typingIndicator');
      if (el) el.remove();
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;

      appendMessage('user', text);
      history.push({ role: 'user', content: text });

      showTyping();

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history }),
        });

        const data = await res.json();
        removeTyping();

        if (!res.ok) {
          const errMsg = data.error || `HTTP ${res.status}`;
          console.error('[/chat 오류]', errMsg);
          appendMessage('assistant', '오류가 발생했습니다: ' + errMsg);
        } else if (data.reply) {
          appendMessage('assistant', data.reply);
          history.push({ role: 'assistant', content: data.reply });
        } else {
          console.error('[/chat 오류] reply 필드 없음', data);
          appendMessage('assistant', '오류가 발생했습니다: ' + (data.error || '알 수 없는 오류'));
        }
      } catch (err) {
        removeTyping();
        console.error('[fetch 오류]', err);
        appendMessage('assistant', '서버에 연결할 수 없습니다.');
      }

      sendBtn.disabled = false;
      inputEl.focus();
    }

    sendBtn.addEventListener('click', sendMessage);

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });
  </script>
</body>
</html>
